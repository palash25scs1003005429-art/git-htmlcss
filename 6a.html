<!DOCTYPE html>
<html>
    <head>
        <style>
    p{
        font-family:Arial;
        text-align: center;
    }
    button{
        font-family:Arial;
        margin:0 auto;
        display:block;
    }
    .product-age{
        color:rgb(217, 82, 10);
        font-size:12px;
        font-weight:bold;
        margin-bottom:5px;
    }
    .product-name{
        font-weight: bold;
        font-size:20px;
        margin-top:0;
        margin-bottom:0;
    }
    .product-tagline{
        font-weight:bold;
        font-size:35px;
        margin-top:0;
        margin-bottom:0;
    }
    .product-pricing{
        margin-top:8px;
        margin-bottom:8px;
    }
    .buy-button{
        border:none;
        color:white;
        background-color:rgb(0, 110, 255);
        padding-right:12px;
        padding-left:12px;
        padding-top:7px;
        padding-bottom:7px;
        border-radius:18px;
        font-weight:bold;
        margin-top:10px;
    }
    

        </style>
    </head>
    <body>
<p class="product-age">New</p>
<p class="product-name">MacBook Pro</p>
<p class="product-tagline">Supercharged for pros.</p>
<p class="product-pricing">From &#36;1999</p>
<button class="buy-button">Buy</button>
    </body>
</html>
